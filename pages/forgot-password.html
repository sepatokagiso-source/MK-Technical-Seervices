<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | MK Technical Services</title>
    <meta name="description" content="Reset your MK Technical Services client portal password securely. Enter your email to receive a password reset code.">
    <link rel="icon" href="/media/logo.png" type="image/png">
    <link rel="canonical" href="https://www.mktechnicalservices.co.za/pages/forgot-password.html">
    <meta property="og:title" content="Reset Password | MK Technical Services">
    <meta property="og:description" content="Reset your client portal password securely.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.mktechnicalservices.co.za/pages/forgot-password.html">
    <meta property="og:image" content="https://www.mktechnicalservices.co.za/media/logo.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Reset Password | MK Technical Services">
    <meta name="twitter:description" content="Reset your client portal password securely.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Open+Sans:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary-teal), var(--primary-blue));
            padding: 2rem;
        }

        .auth-card {
            background: white;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl);
            max-width: 450px;
            width: 100%;
            padding: 2rem;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header img {
            height: 60px;
            margin-bottom: 1rem;
        }

        .step {
            display: none;
        }

        .step.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .alert {
            padding: 1rem;
            border-radius: var(--radius-md);
            margin-bottom: 1rem;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
        }

        .otp-inputs {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin: 1.5rem 0;
        }

        .otp-input {
            width: 50px;
            height: 50px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            border: 2px solid #E0E0E0;
            border-radius: var(--radius-md);
        }

        .otp-input:focus {
            border-color: var(--primary-teal);
            outline: none;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <a href="#main" class="skip-link">Skip to main content</a>
    <div id="main" class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="/">
                    <img src="/media/logo.png" alt="MK Technical Services">
                </a>
                <h2>Reset Password</h2>
                <p style="color: var(--text-secondary);">We'll help you get back in</p>
            </div>

            <div id="alert" class="alert"></div>

            <!-- Step 1: Email -->
            <div id="step1" class="step active">
                <p style="margin-bottom: 1.5rem; text-align: center;">Enter your email address and we'll send you a
                    verification code.</p>
                <form id="emailForm">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" required placeholder="your@email.com">
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">
                        Send Code
                    </button>
                </form>
            </div>

            <!-- Step 2: OTP -->
            <div id="step2" class="step">
                <p style="margin-bottom: 1rem; text-align: center;">Enter the 6-digit code sent to <strong
                        id="emailDisplay"></strong></p>
                <div class="otp-inputs">
                    <input type="text" class="otp-input" maxlength="1" data-index="0">
                    <input type="text" class="otp-input" maxlength="1" data-index="1">
                    <input type="text" class="otp-input" maxlength="1" data-index="2">
                    <input type="text" class="otp-input" maxlength="1" data-index="3">
                    <input type="text" class="otp-input" maxlength="1" data-index="4">
                    <input type="text" class="otp-input" maxlength="1" data-index="5">
                </div>
                <button id="verifyOTP" class="btn btn-primary" style="width: 100%;">
                    Verify Code
                </button>
                <div style="text-align: center; margin-top: 1rem;">
                    <a href="javascript:void(0)" id="resendCode" style="color: var(--primary-teal); font-size: 0.9rem;">Resend Code</a>
                </div>
            </div>

            <!-- Step 3: New Password -->
            <div id="step3" class="step">
                <p style="margin-bottom: 1.5rem; text-align: center;">Create a new password for your account</p>
                <form id="passwordForm">
                    <div class="form-group">
                        <label for="newPassword">New Password</label>
                        <input type="password" id="newPassword" required placeholder="Enter new password" minlength="6">
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" required placeholder="Confirm new password">
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">
                        Reset Password
                    </button>
                </form>
            </div>

            <div style="text-align: center; margin-top: 1.5rem;">
                <a href="/pages/login.html" style="color: var(--primary-teal); font-weight: 600;">
                    <i class="fas fa-arrow-left"></i> Back to Login
                </a>
            </div>
        </div>
    </div>

    <script type="module">
        let currentEmail = '';
        let generatedOTP = '';

        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hash = await crypto.subtle.digest('SHA-256', data);
            return Array.from(new Uint8Array(hash))
                .map(b => b.toString(16).padStart(2, '0'))
                .join('');
        }

        function showAlert(message, type = 'success') {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = `alert alert-${type} show`;
        }

        function showStep(stepNumber) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById(`step${stepNumber}`).classList.add('active');
        }

        // Step 1: Email submission
        document.getElementById('emailForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;

            // Check if email exists
            const users = JSON.parse(localStorage.getItem('mktech_users') || '[]');
            const user = users.find(u => u.email === email);

            if (!user) {
                showAlert('Email not found', 'error');
                return;
            }

            // Generate 6-digit OTP
            generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
            currentEmail = email;

            // In production, send this via email
            console.log('OTP:', generatedOTP);

            document.getElementById('emailDisplay').textContent = email;
            showAlert(`Code sent to ${email}! (Check console for demo)`, 'success');
            showStep(2);
        });

        // OTP Input handling
        const otpInputs = document.querySelectorAll('.otp-input');
        otpInputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < 5) {
                    otpInputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    otpInputs[index - 1].focus();
                }
            });
        });

        // Verify OTP
        document.getElementById('verifyOTP').addEventListener('click', () => {
            const enteredOTP = Array.from(otpInputs).map(input => input.value).join('');

            if (enteredOTP.length !== 6) {
                showAlert('Please enter all 6 digits', 'error');
                return;
            }

            if (enteredOTP === generatedOTP) {
                showAlert('Code verified!', 'success');
                showStep(3);
            } else {
                showAlert('Invalid code. Please try again.', 'error');
            }
        });

        // Resend code
        document.getElementById('resendCode').addEventListener('click', (e) => {
            e.preventDefault();
            generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
            console.log('New OTP:', generatedOTP);
            showAlert('New code sent!', 'success');
        });

        // Reset password
        document.getElementById('passwordForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword !== confirmPassword) {
                showAlert('Passwords do not match', 'error');
                return;
            }

            // Update password
            const users = JSON.parse(localStorage.getItem('mktech_users') || '[]');
            const userIndex = users.findIndex(u => u.email === currentEmail);

            if (userIndex !== -1) {
                const hashedPassword = await hashPassword(newPassword);
                users[userIndex].password = hashedPassword;
                localStorage.setItem('mktech_users', JSON.stringify(users));

                showAlert('Password reset successful! Redirecting...', 'success');

                setTimeout(() => {
                    window.location.href = '/pages/login.html';
                }, 2000);
            }
        });
    </script>

    <script type="module" src="/src/main.js"></script>
</body>

</html>
