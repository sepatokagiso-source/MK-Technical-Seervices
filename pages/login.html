<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MK Technical Services</title>
    <meta name="description" content="Client portal login for MK Technical Services. Access your quotes, service history, and project updates.">
    <link rel="icon" href="/media/logo.png" type="image/png">
    <link rel="canonical" href="https://www.mktechnicalservices.co.za/pages/login.html">
    <meta property="og:title" content="Client Portal Login | MK Technical Services">
    <meta property="og:description" content="Access your quotes, service history, and project updates.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.mktechnicalservices.co.za/pages/login.html">
    <meta property="og:image" content="https://www.mktechnicalservices.co.za/media/logo.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Client Portal Login | MK Technical Services">
    <meta name="twitter:description" content="Access your quotes, service history, and project updates.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Open+Sans:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary-teal), var(--primary-blue));
            padding: 2rem;
        }

        .auth-card {
            background: white;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl);
            max-width: 450px;
            width: 100%;
            overflow: hidden;
        }

        .auth-header {
            text-align: center;
            padding: 2rem 2rem 1rem;
        }

        .auth-header img {
            height: 60px;
            margin-bottom: 1rem;
        }

        .auth-tabs {
            display: flex;
            border-bottom: 2px solid var(--bg-light);
        }

        .auth-tab {
            flex: 1;
            padding: 1rem;
            text-align: center;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-base);
            border-bottom: 3px solid transparent;
        }

        .auth-tab.active {
            color: var(--primary-teal);
            border-bottom-color: var(--primary-teal);
        }

        .auth-body {
            padding: 2rem;
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-secondary);
        }

        .password-toggle:hover {
            color: var(--primary-teal);
        }

        .form-group {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .alert {
            padding: 1rem;
            border-radius: var(--radius-md);
            margin-bottom: 1rem;
            display: none;
        }

        .alert.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }

        .back-link a {
            color: var(--primary-teal);
            font-weight: 600;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <a href="#main" class="skip-link">Skip to main content</a>
    <div id="main" class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="/">
                    <img src="/media/logo.png" alt="MK Technical Services">
                </a>
                <h2>Welcome Back</h2>
                <p style="color: var(--text-secondary);">Access your account</p>
            </div>

            <div class="auth-tabs">
                <div class="auth-tab active" data-tab="login">Login</div>
                <div class="auth-tab" data-tab="register">Register</div>
            </div>

            <div class="auth-body">
                <div id="alert" class="alert"></div>

                <!-- Login Form -->
                <form id="loginForm" class="auth-form active">
                    <div class="form-group">
                        <label for="loginEmail">Email Address</label>
                        <input type="email" id="loginEmail" name="email" required placeholder="your@email.com">
                    </div>

                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" name="password" required
                            placeholder="Enter your password">
                        <i class="fas fa-eye password-toggle" data-target="loginPassword"></i>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%;">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>

                    <div style="text-align: center; margin-top: 1rem;">
                        <a href="/pages/forgot-password.html"
                            style="color: var(--primary-teal); font-size: 0.9rem;">Forgot Password?</a>
                    </div>
                </form>

                <!-- Register Form -->
                <form id="registerForm" class="auth-form">
                    <div class="form-group">
                        <label for="registerName">Full Name</label>
                        <input type="text" id="registerName" name="name" required placeholder="John Doe">
                    </div>

                    <div class="form-group">
                        <label for="registerEmail">Email Address</label>
                        <input type="email" id="registerEmail" name="email" required placeholder="your@email.com">
                    </div>

                    <div class="form-group">
                        <label for="registerPhone">Phone Number</label>
                        <input type="tel" id="registerPhone" name="phone" required placeholder="+27 12 655 2343">
                    </div>

                    <div class="form-group">
                        <label for="registerPassword">Password</label>
                        <input type="password" id="registerPassword" name="password" required
                            placeholder="Create a password" minlength="6">
                        <i class="fas fa-eye password-toggle" data-target="registerPassword"></i>
                    </div>

                    <div class="form-group">
                        <label for="registerConfirmPassword">Confirm Password</label>
                        <input type="password" id="registerConfirmPassword" name="confirmPassword" required
                            placeholder="Confirm your password">
                        <i class="fas fa-eye password-toggle" data-target="registerConfirmPassword"></i>
                    </div>

                    <div class="form-group" style="margin-bottom: 1rem;">
                        <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                            <input type="checkbox" id="terms" required>
                            <span style="font-size: 0.9rem;">I agree to the Terms & Conditions</span>
                        </label>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%;">
                        <i class="fas fa-user-plus"></i> Create Account
                    </button>
                </form>

                <div class="back-link">
                    <a href="/"><i class="fas fa-arrow-left"></i> Back to Home</a>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        // Simple hash function for password storage
        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hash = await crypto.subtle.digest('SHA-256', data);
            return Array.from(new Uint8Array(hash))
                .map(b => b.toString(16).padStart(2, '0'))
                .join('');
        }

        // Tab switching
        document.querySelectorAll('.auth-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                const targetTab = tab.dataset.tab;

                // Update active tab
                document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');

                // Update active form
                document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
                document.getElementById(targetTab + 'Form').classList.add('active');

                // Clear alert
                hideAlert();
            });
        });

        // Password toggle
        document.querySelectorAll('.password-toggle').forEach(toggle => {
            toggle.addEventListener('click', () => {
                const targetId = toggle.dataset.target;
                const input = document.getElementById(targetId);

                if (input.type === 'password') {
                    input.type = 'text';
                    toggle.classList.remove('fa-eye');
                    toggle.classList.add('fa-eye-slash');
                } else {
                    input.type = 'password';
                    toggle.classList.remove('fa-eye-slash');
                    toggle.classList.add('fa-eye');
                }
            });
        });

        // Alert functions
        function showAlert(message, type = 'success') {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = `alert alert-${type} show`;
        }

        function hideAlert() {
            const alert = document.getElementById('alert');
            alert.className = 'alert';
        }

        // Login form
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            // Get users from localStorage
            const users = JSON.parse(localStorage.getItem('mktech_users') || '[]');

            // Hash the entered password
            const hashedPassword = await hashPassword(password);

            // Find user
            const user = users.find(u => u.email === email && u.password === hashedPassword);

            if (user) {
                // Save current user
                localStorage.setItem('mktech_current_user', JSON.stringify(user));

                showAlert('Login successful! Redirecting...', 'success');

                setTimeout(() => {
                    if (user.role === 'admin') {
                        window.location.href = '/pages/admin.html';
                    } else {
                        window.location.href = '/pages/dashboard.html';
                    }
                }, 1000);
            } else {
                showAlert('Invalid email or password', 'error');
            }
        });

        // Register form
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const phone = document.getElementById('registerPhone').value;
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('registerConfirmPassword').value;

            // Validate passwords match
            if (password !== confirmPassword) {
                showAlert('Passwords do not match', 'error');
                return;
            }

            // Get existing users
            const users = JSON.parse(localStorage.getItem('mktech_users') || '[]');

            // Check if email already exists
            if (users.find(u => u.email === email)) {
                showAlert('Email already registered', 'error');
                return;
            }

            // Hash password
            const hashedPassword = await hashPassword(password);

            // Create new user
            const newUser = {
                id: Date.now(),
                name,
                email,
                phone,
                password: hashedPassword,
                role: 'customer',
                createdAt: new Date().toISOString()
            };

            // Save user
            users.push(newUser);
            localStorage.setItem('mktech_users', JSON.stringify(users));

            showAlert('Account created successfully! Please login.', 'success');

            // Switch to login tab after 1.5 seconds
            setTimeout(() => {
                document.querySelector('[data-tab="login"]').click();
                document.getElementById('loginEmail').value = email;
            }, 1500);
        });

        // Check if already logged in
        const currentUser = localStorage.getItem('mktech_current_user');
        if (currentUser) {
            const user = JSON.parse(currentUser);
            if (user.role === 'admin') {
                window.location.href = '/pages/admin.html';
            } else {
                window.location.href = '/pages/dashboard.html';
            }
        }
    </script>

    <script type="module" src="/src/main.js"></script>
</body>

</html>
